<div class="forgot-password-container">
    <div class="forgot-password-card">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">
                Reset Password
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Follow the steps to secure your account
            </p>
        </div>

        <!-- Error/Success Messages -->
        <div *ngIf="error" class="alert-error">
            {{ error }}
        </div>
        <div *ngIf="message"
            class="bg-green-50 text-green-700 p-3 rounded-md mb-4 text-sm text-center border border-green-200">
            {{ message }}
        </div>

        <!-- Step 1: Email Input -->
        <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="sendCode()" class="space-y-6">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="Enter your email">
            </div>

            <button type="submit" [disabled]="isLoading || emailForm.invalid" class="btn-primary">
                <span *ngIf="isLoading">Sending...</span>
                <span *ngIf="!isLoading">Send Reset Code</span>
            </button>
            <div class="text-center mt-4">
                <a routerLink="/login" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500">Back to
                    Login</a>
            </div>
        </form>

        <!-- Step 2: Code Verification -->
        <form *ngIf="step === 2" [formGroup]="codeForm" (ngSubmit)="verifyCode()" class="space-y-6">
            <div class="text-center text-sm text-gray-600 mb-4">
                A verification code has been sent to <strong>{{ email }}</strong>
            </div>
            <div class="form-group">
                <label for="code" class="text-center block">Verification Code (6 digits)</label>
                <input id="code" type="text" formControlName="code" maxlength="6" class="input-code"
                    placeholder="000000">
            </div>

            <button type="submit" [disabled]="isLoading || codeForm.invalid" class="btn-primary">
                <span *ngIf="isLoading">Verifying...</span>
                <span *ngIf="!isLoading">Verify Code</span>
            </button>
            <div class="text-center mt-4">
                <button type="button" (click)="step = 1"
                    class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 border-none bg-transparent cursor-pointer">Change
                    Email</button>
            </div>
        </form>

        <!-- Step 3: New Password -->
        <form *ngIf="step === 3" [formGroup]="passwordForm" (ngSubmit)="resetPassword()" class="space-y-6">
            <div class="form-group">
                <label for="password">New Password</label>
                <input id="password" type="password" formControlName="password" placeholder="At least 8 characters">
                <div *ngIf="passwordForm.get('password')?.touched && passwordForm.get('password')?.errors?.['minlength']"
                    class="text-xs text-red-500 mt-1">
                    Le mot de passe doit faire au moins 8 caractères.
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" formControlName="confirmPassword"
                    placeholder="Repeat new password">
                <div *ngIf="passwordForm.touched && passwordForm.errors?.['mismatch']"
                    class="text-xs text-red-500 mt-1">
                    Les mots de passe ne correspondent pas.
                </div>
            </div>

            <button type="submit" [disabled]="isLoading || passwordForm.invalid" class="btn-primary">
                <span *ngIf="isLoading">Resetting...</span>
                <span *ngIf="!isLoading">Set New Password</span>
            </button>
        </form>

    </div>
</div>
