<div class="page-header">
  <h1 class="page-title">Utilisateurs archivés</h1>
  <span class="page-count" *ngIf="!isLoading">{{ users.length }} archivé(s)</span>
</div>

<div class="card">

  <div class="card-top">
    <div class="search-area">
      <div class="search-wrapper">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          class="search"
          type="text"
          placeholder="Rechercher un utilisateur archivé..."
          [(ngModel)]="q"
          (keyup.enter)="search()"
        />
      </div>
      <button class="btn" (click)="search()">Rechercher</button>
    </div>
  </div>

  <!-- Chargement -->
  <div class="loading-wrap" *ngIf="isLoading">
    <div class="spinner"></div>
    Chargement en cours...
  </div>

  <!-- Erreur -->
  <div class="error-msg" *ngIf="!isLoading && errorMessage">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ errorMessage }}
  </div>

  <!-- Tableau -->
  <div class="table-wrap" *ngIf="!isLoading && !errorMessage">
    <table class="users-table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Email</th>
          <th>Rôles</th>
          <th>Archivé le</th>
          <th class="actions">Actions</th>
        </tr>
      </thead>
      <tbody>

        <tr *ngFor="let u of users">
          <td>
            <div class="user-name">{{ u.nomprenom || '—' }}</div>
          </td>
          <td>{{ u.email }}</td>
          <td>
            <span class="role-badge"
              [class.admin]="roleNames(u).toLowerCase().includes('admin')">
              {{ roleNames(u) || '—' }}
            </span>
          </td>
          <td>
            <span class="archive-date">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" style="margin-right: 4px;">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span *ngIf="u.deleted_at; else noDate">
                {{ u.deleted_at | date:'dd/MM/yyyy HH:mm' }}
              </span>
              <ng-template #noDate>
                <span>—</span>
              </ng-template>
            </span>
          </td>
          <td class="actions">
            <button class="btn small" (click)="restore(u.id)" title="Restaurer l'utilisateur">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M3 12h4l3-3-3-3H3"/>
                <path d="M3 12v3a5 5 0 0 0 5 5h8a5 5 0 0 0 5-5v-3"/>
                <path d="M16 9l3-3-3-3"/>
                <path d="M21 6v3"/>
              </svg>
              Restaurer
            </button>
            <button class="btn danger small" (click)="forceDelete(u.id)" title="Supprimer définitivement">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
              Supprimer définitivement
            </button>
          </td>
        </tr>

        <!-- État vide -->
        <tr *ngIf="users.length === 0" class="state-row">
          <td colspan="5">
            <div class="empty-state">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
                <path d="M12 3v4"/>
                <path d="M12 11v4"/>
                <path d="M12 19v2"/>
              </svg>
              <p>Aucun utilisateur archivé trouvé.</p>
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>
